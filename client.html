<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3D2B1F" />
  <meta name="robots" content="noindex, nofollow" />
  <title>IAC Home Improvement — Project Portal</title>
  <!-- ==========================================================================
       IAC — CLIENT PROJECT PORTAL (client.html) — single standalone file
       --------------------------------------------------------------------------
       SECURITY MODEL:
         * READ-ONLY. The only network call is the SECURITY DEFINER RPC
           client_get(p_token) with the PUBLIC anon key. The anon role has zero
           table access (RLS) — this page can only see what client_get returns
           for ITS token. Cross-token isolation is enforced server-side.
         * CLIENT-SAFE ONLY: project status, per-stage progress counts,
           client updates (notas_cliente) and change orders with CLIENT price.
           NEVER shown/requested: sub repasse, internal job total, margins,
           sub phone numbers, other clients' jobs.
       ========================================================================== -->
  <style>
    :root {
      --warm-bg: #3D2B1F;
      --warm-bg-2: #4a3527;
      --orange: #D4722A;
      --orange-soft: #e8924f;
      --warm-light: #F5EDE4;
      --green: #3f8f5b;
      --green-soft: #e4f1e9;
      --red: #c1432f;
      --ink: #2c2017;
      --ink-soft: #6b5a4a;
      --ink-faint: #9a8a7a;
      --card: #ffffff;
      --line: #ece3d8;
      --line-2: #ddd0c2;
      --light-2: #f1ebe3;
      --amber-soft: #fbf1e6;
      --radius: 16px;
      --maxw: 560px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--warm-light);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ---------- HEADER ---------- */
    .app-header {
      background: var(--warm-bg);
      color: var(--warm-light);
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 2px 10px rgba(61, 43, 31, .18);
    }
    .app-header .brand { display: flex; align-items: center; gap: 12px; max-width: var(--maxw); margin: 0 auto; }
    .app-header .logo { width: 42px; height: 42px; border-radius: 11px; object-fit: contain; background: rgba(245, 237, 228, .1); flex: none; }
    .app-header .brand-name { font-size: 16px; font-weight: 800; line-height: 1.1; }
    .app-header .brand-sub { font-size: 11.5px; color: var(--orange-soft); font-weight: 700; margin-top: 2px; letter-spacing: .02em; }

    /* ---------- LAYOUT ---------- */
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 18px 16px 30px; }
    .section-title {
      font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em;
      color: var(--orange); margin: 26px 0 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-title .iac-icon { width: 15px; height: 15px; }
    .section-title::after { content: ""; flex: 1; height: 2px; background: var(--line); border-radius: 2px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 15px 16px;
    }
    .iac-icon { display: inline-block; vertical-align: middle; }

    /* ---------- HERO ---------- */
    .cl-hero {
      background: var(--warm-bg);
      background-image: linear-gradient(150deg, var(--warm-bg), var(--warm-bg-2));
      color: var(--warm-light);
      border-radius: var(--radius);
      padding: 18px 17px 14px;
      box-shadow: 0 6px 18px rgba(61, 43, 31, .14);
    }
    .cl-hero .top { display: flex; align-items: center; gap: 13px; }
    .cl-hero .ico { width: 52px; height: 52px; border-radius: 15px; background: rgba(245, 237, 228, .14); color: var(--orange-soft); display: grid; place-items: center; flex: none; }
    .cl-hero .ico .iac-icon { width: 26px; height: 26px; }
    .cl-hero h1 { font-size: 21px; margin: 0; font-weight: 800; line-height: 1.15; }
    .cl-hero .sub { font-size: 12.5px; color: var(--orange-soft); font-weight: 700; margin-top: 3px; }
    .cl-hero .addr { display: flex; align-items: center; gap: 9px; font-size: 14px; margin-top: 13px; padding-top: 12px; border-top: 1px solid rgba(245, 237, 228, .13); }
    .cl-hero .addr .iac-icon { width: 17px; height: 17px; color: var(--orange-soft); flex: none; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 13px; padding: 7px 14px; border-radius: 999px;
      background: rgba(245, 237, 228, .14); color: var(--warm-light);
      font-size: 13px; font-weight: 800; letter-spacing: .02em;
    }
    .status-pill .iac-icon { width: 15px; height: 15px; color: var(--orange-soft); }
    .status-pill.done { background: var(--green); }
    .status-pill.done .iac-icon { color: #fff; }

    /* ---------- OVERALL PROGRESS ---------- */
    .overall { margin-top: 14px; }
    .overall .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
    .overall .lbl { font-weight: 800; font-size: 14px; color: var(--warm-bg); }
    .overall .pct { font-weight: 900; font-size: 18px; color: var(--orange); font-variant-numeric: tabular-nums; }
    .pbar { height: 12px; background: var(--light-2); border-radius: 999px; overflow: hidden; }
    .pbar > i { display: block; height: 100%; width: 0; background: var(--green); border-radius: 999px; transition: width .4s ease; }
    .pbar.orange > i { background: var(--orange); }

    /* ---------- STAGES (per work order) ---------- */
    .stage { display: flex; gap: 13px; align-items: flex-start; padding: 13px 0; }
    .stage + .stage { border-top: 1px solid var(--line); }
    .stage .sico { width: 40px; height: 40px; border-radius: 12px; background: var(--light-2); color: var(--orange); display: grid; place-items: center; flex: none; }
    .stage .sico .iac-icon { width: 21px; height: 21px; }
    .stage.done .sico { background: var(--green-soft); color: var(--green); }
    .stage .body { flex: 1; min-width: 0; }
    .stage .nm { font-weight: 800; font-size: 14.5px; color: var(--ink); line-height: 1.3; }
    .stage .meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 6px; }
    .stage .cnt { font-size: 12px; color: var(--ink-soft); font-weight: 700; font-variant-numeric: tabular-nums; }
    .stage .st { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .05em; padding: 3px 9px; border-radius: 999px; }
    .stage .st.todo { background: var(--light-2); color: var(--ink-soft); }
    .stage .st.doing { background: var(--amber-soft); color: var(--orange); }
    .stage .st.ok { background: var(--green-soft); color: var(--green); }
    .stage .pbar { margin-top: 8px; height: 9px; }

    /* ---------- UPDATES ---------- */
    .upd { display: flex; gap: 11px; padding: 12px 0; align-items: flex-start; }
    .upd + .upd { border-top: 1px solid var(--line); }
    .upd .uico { width: 32px; height: 32px; border-radius: 10px; background: var(--amber-soft); color: var(--orange); display: grid; place-items: center; flex: none; }
    .upd .uico .iac-icon { width: 17px; height: 17px; }
    .upd .txt { flex: 1; font-size: 14.5px; line-height: 1.5; }
    .upd .dt { font-size: 11.5px; color: var(--ink-faint); font-weight: 700; margin-bottom: 2px; }

    /* ---------- EXTRAS / CHANGE ORDERS ---------- */
    .xtra { padding: 13px 0; }
    .xtra + .xtra { border-top: 1px solid var(--line); }
    .xtra .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .xtra .desc { flex: 1; font-weight: 700; font-size: 14.5px; line-height: 1.4; }
    .xtra .val { font-weight: 900; font-size: 16px; color: var(--warm-bg); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .xtra .st { display: inline-block; margin-top: 7px; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .05em; padding: 3px 10px; border-radius: 999px; }
    .xtra .st.proposed { background: var(--amber-soft); color: var(--orange); }
    .xtra .st.approved { background: var(--green-soft); color: var(--green); }
    .xtra .st.donest { background: var(--green); color: #fff; }
    .note {
      background: var(--amber-soft); border: 1px solid #f0d4b6; color: #8a4a18;
      border-radius: 12px; padding: 12px 13px; font-size: 13.5px; font-weight: 600;
      display: flex; gap: 9px; align-items: flex-start; line-height: 1.5; margin-top: 12px;
    }
    .note .iac-icon { color: var(--orange); flex: none; margin-top: 1px; width: 16px; height: 16px; }

    /* ---------- FOOTER ---------- */
    .cl-footer {
      max-width: var(--maxw); margin: 30px auto 0; padding: 20px 16px calc(26px + env(safe-area-inset-bottom));
      border-top: 2px solid var(--line);
      text-align: center; color: var(--ink-soft); font-size: 12.5px; line-height: 1.7;
    }
    .cl-footer .co { font-weight: 900; color: var(--warm-bg); font-size: 14px; }
    .cl-footer .lic { color: var(--ink-faint); }
    .cl-footer a { color: var(--orange); font-weight: 800; text-decoration: none; }

    /* ---------- EMPTY / INVALID LINK ---------- */
    .empty { text-align: center; color: var(--ink-faint); padding: 64px 24px; font-weight: 600; }
    .empty .iac-icon { width: 48px; height: 48px; color: var(--line-2); }
    .empty .ttl { font-size: 20px; color: var(--warm-bg); margin-top: 16px; font-weight: 800; }
    .empty .sub { margin-top: 6px; font-size: 14px; }

    /* ---------- LOADING ---------- */
    .loading { text-align: center; padding: 64px 20px; color: var(--ink-soft); font-weight: 700; }
    .loading::before { content: ""; display: block; width: 30px; height: 30px; margin: 0 auto 16px; border: 3px solid var(--line); border-top-color: var(--orange); border-radius: 50%; animation: cspin .7s linear infinite; }
    @keyframes cspin { to { transform: rotate(360deg); } }
  </style>
</head>

  function icon(name, size) {
    var body = SVG[name] || SVG.generic;
    var s = size || 24;
    return (
      '<svg class="iac-icon" viewBox="0 0 24 24" width="' + s + '" height="' + s +
      '" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' + body + '</svg>'
    );
  }

  // Mapeia o texto livre de tipo_servico -> chave de icone
  function forService(text) {
    var t = (text || '').toLowerCase();
    if (/herringbone|chevron|hardwood|engineered|wood install/.test(t)) return 'hardwood';
    if (/vinyl|lvp|laminate/.test(t)) return 'vinyl';
    if (/tile|ceramic/.test(t)) return 'tile';
    if (/epoxy/.test(t)) return 'epoxy';
    if (/sand|refinish|s&r/.test(t)) return 'sandrefinish';
    if (/stair/.test(t)) return 'stairs';
    if (/demo|rip ?off|ram board/.test(t)) return 'demo';
    if (/bath/.test(t)) return 'bath';
    if (/kitchen/.test(t)) return 'kitchen';
    if (/remodel/.test(t)) return 'remodel';
    if (/mason|cmu|brick|block/.test(t)) return 'masonry';
    if (/paver/.test(t)) return 'pavers';
    if (/carpentry|trim|cabinet|finish|truss/.test(t)) return 'carpentry';
    if (/carpet/.test(t)) return 'carpet';
    if (/handyman/.test(t)) return 'handyman';
    if (/floor/.test(t)) return 'flooring';
    return 'generic';
  }

  // Mapeia status do pipeline -> chave de icone
  function forStatus(status) {
    var t = (status || '').toLowerCase();
    if (/lead/.test(t)) return 'lead';
    if (/visita/.test(t)) return 'visita';
    if (/estimate/.test(t)) return 'estimate';
    if (/schedule/.test(t)) return 'schedule';
    if (/prep/.test(t)) return 'prep';
    if (/progress/.test(t)) return 'progress';
    if (/blocker/.test(t)) return 'blocker';
    if (/review/.test(t)) return 'review';
    if (/done|conclu/.test(t)) return 'done';
    if (/perdid|lost/.test(t)) return 'perdido';
    return 'progress';
  }

  window.IAC_ICONS = {
    svg: SVG,
    icon: icon,
    forService: forService,
    forStatus: forStatus
  };
})();

  </script>

  <script>
  /* ==========================================================================
     CLIENT PORTAL APP — read-only, English, client-safe fields only.
     Only RPC used: client_get(p_token). No writes, no storage, no tables.
     ========================================================================== */
  (function () {
    var SUPA_URL = 'https://riceqxgudaziragogfxm.supabase.co';
    var ANON_KEY = 'sb_publishable_cHJJEI3rzVQmMM8j5I3WDg_N4yf6Irq'; // public by design (RLS locks everything)

    var ICN = window.IAC_ICONS;
    var view = document.getElementById('view');

    function ic(n, s) { return ICN.icon(n, s); }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
    function getToken() {
      var m = location.search.match(/[?&]t=([^&]+)/);
      if (m) return decodeURIComponent(m[1]);
      var h = location.hash.match(/t=([^&]+)/);
      if (h) return decodeURIComponent(h[1]);
      return null;
    }
    function fmtMoney(n) {
      var v = Number(n || 0);
      return '$' + v.toLocaleString('en-US', {
        minimumFractionDigits: (v % 1 === 0 ? 0 : 2), maximumFractionDigits: 2
      });
    }
    function fmtDate(s) {
      if (!s) return '';
      var d = new Date(String(s).slice(0, 10) + 'T00:00:00');
      if (isNaN(d)) return String(s);
      var M = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return M[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    // internal (pt) status -> client-facing English label
    function jobStatusEn(s) {
      var t = (s || '').toLowerCase();
      if (/done|conclu|review/.test(t)) return { label: 'Completed', icon: 'done', done: true };
      if (/progress|andamento/.test(t)) return { label: 'In Progress', icon: 'progress', done: false };
      if (/prep/.test(t)) return { label: 'Getting Ready', icon: 'prep', done: false };
      if (/schedule|agendad/.test(t)) return { label: 'Scheduled', icon: 'schedule', done: false };
      if (/estimate/.test(t)) return { label: 'Estimate Sent', icon: 'estimate', done: false };
      if (/visita/.test(t)) return { label: 'Estimate Visit Done', icon: 'visita', done: false };
      if (/lead/.test(t)) return { label: 'New Project', icon: 'lead', done: false };
      return { label: 'In Progress', icon: 'progress', done: false };
    }
    // work-order status -> stage chip
    function woStatusEn(s, doneCount, totalCount) {
      var t = (s || '').toLowerCase();
      if (/conclu|done|complete/.test(t)) return { label: 'Completed', cls: 'ok', done: true };
      if (/andamento|progress/.test(t) || (doneCount > 0)) return { label: 'In Progress', cls: 'doing', done: false };
      return { label: 'Scheduled', cls: 'todo', done: false };
    }
    function extraStatusEn(s) {
      var t = (s || '').toLowerCase();
      if (/done|conclu|feito|finish/.test(t)) return { label: 'Done', cls: 'donest' };
      if (/approv|aprovad/.test(t)) return { label: 'Approved', cls: 'approved' };
      return { label: 'Proposed', cls: 'proposed' };
    }

    function renderInvalid() {
      view.innerHTML = '<div class="empty">' +
        ic('blocker', 48) +
        '<div class="ttl">Invalid link</div>' +
        '<div class="sub">This project link is not valid or has expired.<br/>' +
        'Please contact IAC Home Improvement at <a href="tel:+18482340283" style="color:var(--orange);font-weight:800">(848) 234-0283</a>.</div></div>';
    }

    function render(P) {
      // ---- normalize client-safe fields (defensive against shape variants) ----
      var name = P.cliente || P.nome || 'Your Project';
      var addr = [P.endereco, P.cidade_st].filter(Boolean).join(', ');
      var wos = P.work_orders || P.wos || P.etapas || [];
      var notes = P.notas_cliente || P.updates || [];
      var extras = P.extras || P.change_orders || [];
      var st = jobStatusEn(P.status);

      var h = '';

      // HERO
      h += '<div class="cl-hero">' +
        '<div class="top"><div class="ico">' + ic('remodel', 26) + '</div>' +
        '<div><h1>' + esc(name) + '</h1><div class="sub">Project status &amp; updates</div></div></div>';
      if (addr) h += '<div class="addr">' + ic('map', 17) + '<span>' + esc(addr) + '</span></div>';
      h += '<div class="status-pill' + (st.done ? ' done' : '') + '">' + ic(st.icon, 15) +
        '<span>' + esc(st.label) + '</span></div>';
      h += '</div>';

      // OVERALL PROGRESS (aggregate of stage counts — counts only, no internal text)
      var sumDone = 0, sumTotal = 0;
      wos.forEach(function (w) {
        sumDone += Number(w.done_count || 0);
        sumTotal += Number(w.total_count || 0);
      });
      if (sumTotal > 0) {
        var pct = Math.round((sumDone / sumTotal) * 100);
        h += '<div class="card overall">' +
          '<div class="row"><span class="lbl">Overall progress</span><span class="pct">' + pct + '%</span></div>' +
          '<div class="pbar"><i style="width:' + pct + '%"></i></div></div>';
      }

      // STAGES (one per work order: service + done/total; nothing internal)
      if (wos.length) {
        h += '<div class="section-title">' + ic('progress', 15) + 'Work Stages</div>';
        h += '<div class="card">' + wos.map(function (w) {
          var dc = Number(w.done_count || 0), tc = Number(w.total_count || 0);
          var ws = woStatusEn(w.status, dc, tc);
          var p = tc > 0 ? Math.round((dc / tc) * 100) : (ws.done ? 100 : 0);
          if (ws.done) p = 100;
          return '<div class="stage' + (ws.done ? ' done' : '') + '">' +
            '<div class="sico">' + ic(ws.done ? 'done' : ICN.forService(w.servico), 21) + '</div>' +
            '<div class="body"><div class="nm">' + esc(w.servico || 'Work stage') + '</div>' +
            '<div class="meta">' +
            (tc > 0 ? '<span class="cnt">' + dc + ' of ' + tc + ' steps completed</span>' : '<span class="cnt"></span>') +
            '<span class="st ' + ws.cls + '">' + esc(ws.label) + '</span></div>' +
            '<div class="pbar' + (ws.done ? '' : ' orange') + '"><i style="width:' + p + '%"></i></div>' +
            '</div></div>';
        }).join('') + '</div>';
      }

      // UPDATES FROM IAC (notas_cliente — written for the client)
      if (notes.length) {
        h += '<div class="section-title">' + ic('estimate', 15) + 'Updates from IAC</div>';
        h += '<div class="card">' + notes.map(function (n) {
          var txt = (typeof n === 'string') ? n : (n.texto || n.text || n.nota || '');
          var dt = (typeof n === 'object' && n) ? (n.data || n.date || n.created_at || '') : '';
          if (!txt) return '';
          return '<div class="upd"><div class="uico">' + ic('estimate', 17) + '</div>' +
            '<div class="txt">' + (dt ? '<div class="dt">' + esc(fmtDate(dt)) + '</div>' : '') +
            esc(txt) + '</div></div>';
        }).join('') + '</div>';
      }

      // EXTRAS / CHANGE ORDERS (client price only — never internal numbers)
      if (extras.length) {
        h += '<div class="section-title">' + ic('plus', 15) + 'Change Orders</div>';
        h += '<div class="card">' + extras.map(function (x) {
          var xs = extraStatusEn(x.status);
          var desc = x.descricao_en || x.descricao || x.description || '';
          var val = (x.valor_cliente != null ? x.valor_cliente : x.valor);
          return '<div class="xtra"><div class="top">' +
            '<div class="desc">' + esc(desc) + '</div>' +
            (val != null ? '<div class="val">' + esc(fmtMoney(val)) + '</div>' : '') +
            '</div><span class="st ' + xs.cls + '">' + esc(xs.label) + '</span></div>';
        }).join('') + '</div>';
        h += '<div class="note">' + ic('estimate', 16) +
          '<div>To approve a change order, simply reply to Italo by text or call <b>(848) 234-0283</b>.</div></div>';
      }

      view.innerHTML = h;
    }

    async function init() {
      var token = getToken();
      if (!token) return renderInvalid();
      if (!window.supabase || !window.supabase.createClient) return renderInvalid();

      var sb = window.supabase.createClient(SUPA_URL, ANON_KEY, {
        auth: { persistSession: false, autoRefreshToken: false }
      });

      var res;
      try {
        res = await sb.rpc('client_get', { p_token: token });
      } catch (e) {
        return renderInvalid();
      }
      if (!res || res.error || !res.data) return renderInvalid();
      render(res.data);
    }

    init();
  })();
  </script>
