<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3D2B1F" />
  <meta name="robots" content="noindex, nofollow" />
  <title>IAC — Work Order</title>
  <style>
/* ============================================================================
   IAC — PORTAL DO GUY (guy.css)
   Estilo proprio e auto-contido do portal do subcontractor. NAO depende de
   styles.css (que e do painel admin). Mobile-first, alvos grandes (>=48px),
   paleta warm IAC. So UI sub-safe — nenhuma classe de preco/financeiro.
   ============================================================================ */

:root {
  --warm-bg: #3D2B1F;
  --warm-bg-2: #4a3527;
  --orange: #D4722A;
  --orange-soft: #e8924f;
  --warm-light: #F5EDE4;
  --green: #3f8f5b;
  --green-soft: #e4f1e9;
  --ink: #2c2017;
  --ink-soft: #6b5a4a;
  --ink-faint: #9a8a7a;
  --card: #ffffff;
  --line: #ece3d8;
  --line-2: #ddd0c2;
  --light-2: #f1ebe3;
  --amber-soft: #fbf1e6;
  --radius: 16px;
  --maxw: 560px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body { margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--warm-light);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  /* espaco pro rodape fixo de contato (.contact-bar) — nao cobrir conteudo */
  padding-bottom: calc(92px + env(safe-area-inset-bottom));
}

/* ---------- HEADER ---------- */
.app-header {
  background: var(--warm-bg);
  color: var(--warm-light);
  padding: 14px 16px calc(14px + env(safe-area-inset-top));
  padding-top: calc(14px + env(safe-area-inset-top));
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 10px rgba(61, 43, 31, .18);
}
.app-header .brand { display: flex; align-items: center; gap: 12px; max-width: var(--maxw); margin: 0 auto; }
.app-header .logo { width: 42px; height: 42px; border-radius: 11px; object-fit: contain; background: rgba(245, 237, 228, .1); flex: none; }
.app-header .brand-name { font-size: 16px; font-weight: 800; line-height: 1.1; }
.app-header .brand-sub { font-size: 11.5px; color: var(--orange-soft); font-weight: 700; margin-top: 2px; letter-spacing: .02em; }

/* ---------- LAYOUT ---------- */
.wrap { max-width: var(--maxw); margin: 0 auto; padding: 18px 16px 72px; }

.section-title {
  font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em;
  color: var(--orange); margin: 24px 0 12px; display: flex; align-items: center; gap: 8px;
}
.section-title .iac-icon { width: 15px; height: 15px; }
.section-title::after { content: ""; flex: 1; height: 2px; background: var(--line); border-radius: 2px; }

.card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 15px 16px;
}

.iac-icon { display: inline-block; vertical-align: middle; }

/* ---------- HERO (cabecalho da WO) ---------- */
.guy-hero {
  background: var(--warm-bg);
  background-image: linear-gradient(150deg, var(--warm-bg), var(--warm-bg-2));
  color: var(--warm-light);
  border-radius: var(--radius);
  padding: 18px 17px 8px;
  box-shadow: 0 6px 18px rgba(61, 43, 31, .14);
}
.guy-hero .svc { display: flex; align-items: center; gap: 13px; margin-bottom: 12px; }
.guy-hero .svc .ico { width: 52px; height: 52px; border-radius: 15px; background: rgba(245, 237, 228, .14); color: var(--orange-soft); display: grid; place-items: center; flex: none; }
.guy-hero .svc .ico .iac-icon { width: 26px; height: 26px; }
.guy-hero .svc h1 { font-size: 21px; margin: 0; font-weight: 800; line-height: 1.15; }
.guy-hero .svc .s { font-size: 12.5px; color: var(--orange-soft); font-weight: 700; margin-top: 3px; }
.guy-hero .gline { display: flex; align-items: center; gap: 10px; font-size: 14.5px; padding: 9px 0; border-top: 1px solid rgba(245, 237, 228, .13); min-height: 22px; }
.guy-hero .gline .iac-icon { width: 18px; height: 18px; color: var(--orange-soft); flex: none; }
.guy-hero .gline a { color: var(--orange-soft); font-weight: 800; text-decoration: underline; }

/* ---------- BOTAO "ADICIONAR A MINHA AGENDA" (Google Calendar) ----------
   Prefixo gcal- proprio pra nao conflitar. Botao largo SECUNDARIO dentro do
   hero escuro, logo abaixo da linha de data/hora. */
.gcal-wrap { padding: 10px 0 6px; border-top: 1px solid rgba(245, 237, 228, .13); }
.gcal-btn {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  width: 100%; min-height: 48px; padding: 12px 14px;
  border: 1.5px solid var(--orange-soft); border-radius: 13px;
  background: rgba(245, 237, 228, .08);
  color: var(--warm-light); font-size: 14.5px; font-weight: 800;
  letter-spacing: .03em; text-decoration: none; text-align: center;
}
.gcal-btn:active { transform: scale(.98); background: rgba(245, 237, 228, .16); }

.guy-scope { font-size: 15.5px; line-height: 1.55; white-space: pre-wrap; }

/* ---------- PAY CARD (dinheiro DO SUB — repasse; nunca preco do cliente) ---------- */
.pay-card {
  margin-top: 14px;
  background: var(--card);
  border: 2px solid var(--orange);
  border-radius: var(--radius);
  padding: 15px 17px;
  box-shadow: 0 4px 14px rgba(212, 114, 42, .13);
}
.pay-card .pay-main { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.pay-card .pay-emoji { font-size: 24px; line-height: 1; }
.pay-card .pay-lbl { font-size: 15px; font-weight: 800; color: var(--warm-bg); }
.pay-card .pay-val { font-size: 26px; font-weight: 900; color: var(--warm-bg); letter-spacing: -.01em; margin-left: auto; }
.pay-card .pay-agreed { font-size: 15.5px; font-weight: 800; color: var(--warm-bg); }
.pay-card .pay-sub {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line-2);
  font-size: 14.5px; font-weight: 800;
}
.pay-card .pay-sub .ok { color: var(--green); }
.pay-card .pay-sub .dot { color: var(--ink-faint); }
.pay-card .pay-sub .due { color: var(--orange); }
.pay-card .pay-sub.paid { color: var(--green); }
.pay-card .pay-sub.paid .iac-icon { width: 16px; height: 16px; color: var(--green); flex: none; }
.pay-card .pay-hist { margin-top: 9px; }
.pay-card .ph-t { font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-faint); margin-bottom: 5px; }
.pay-card .ph-row { display: flex; justify-content: space-between; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); padding: 3px 0; }
.pay-card .ph-row b { color: var(--ink); }

/* ---------- PENDENCIA / TRABALHO PARCIAL (destaque amarelo/laranja) ---------- */
.pend-card {
  margin-top: 14px;
  background: #fff7e0;
  border: 2px solid #e6a23c;
  border-left: 6px solid var(--orange);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: 0 4px 14px rgba(230, 162, 60, .2);
}
.pend-card .pt {
  display: flex; align-items: center; gap: 9px;
  font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: .03em;
  color: #8a4a18;
}
.pend-card .pt .pe { font-size: 22px; line-height: 1; }
.pend-card .px {
  margin-top: 8px; font-size: 15.5px; font-weight: 700; line-height: 1.5;
  color: var(--ink); white-space: pre-wrap;
}
.pend-card .pr {
  margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e6c890;
  font-size: 14.5px; font-weight: 700; color: #8a4a18;
}
.pend-card .pr b { color: var(--warm-bg); }

/* ---------- NOTE / OBS ---------- */
.note {
  background: var(--amber-soft); border: 1px solid #f0d4b6; color: #8a4a18;
  border-radius: 12px; padding: 12px 13px; font-size: 13.5px; font-weight: 600;
  display: flex; gap: 9px; align-items: flex-start; line-height: 1.5;
}
.note .iac-icon { color: var(--orange); flex: none; margin-top: 1px; width: 16px; height: 16px; }
.note.green { background: var(--green-soft); border-color: #bfe0cb; color: #246b3c; }
.note.green .iac-icon { color: var(--green); }

/* ---------- CHECKLIST (alvos grandes, tocaveis) ---------- */
.progress-bar { height: 10px; background: var(--light-2); border-radius: 999px; overflow: hidden; margin: 8px 0 4px; }
.progress-bar > i { display: block; height: 100%; width: 0; background: var(--green); border-radius: 999px; transition: width .3s ease; }
.prog-label { font-size: 12.5px; color: var(--ink-soft); font-weight: 700; margin-bottom: 12px; }

.checklist { display: flex; flex-direction: column; gap: 9px; }
.chk {
  display: flex; align-items: center; gap: 13px; width: 100%;
  min-height: 58px; padding: 12px 15px; text-align: left;
  background: var(--card); border: 1.5px solid var(--line); border-radius: 14px;
  font-size: 15.5px; font-weight: 600; color: var(--ink); cursor: pointer;
  transition: background .15s, border-color .15s, transform .08s;
}
/* numero grande do passo — legibilidade no canteiro */
.chk .num {
  width: 34px; height: 34px; border-radius: 10px; flex: none;
  background: var(--light-2); color: var(--ink-soft);
  display: grid; place-items: center;
  font-size: 17px; font-weight: 900; font-variant-numeric: tabular-nums;
  transition: all .15s;
}
.chk .box {
  width: 30px; height: 30px; border-radius: 9px; flex: none;
  border: 2px solid var(--line-2); background: var(--light-2);
  display: grid; place-items: center; transition: all .15s;
}
.chk .box .iac-icon { width: 19px; height: 19px; opacity: 0; color: #fff; }
.chk .txt { flex: 1; line-height: 1.35; }
/* etiqueta "voce esta aqui" — so aparece no passo atual */
.chk .here {
  display: none; margin-top: 3px;
  font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .05em;
  color: var(--orange);
}
.chk.done { background: var(--green-soft); border-color: var(--green); color: #246b3c; }
.chk.done .num { background: var(--green); color: #fff; }
.chk.done .box { background: var(--green); border-color: var(--green); }
.chk.done .box .iac-icon { opacity: 1; }
.chk.done .txt { text-decoration: line-through; opacity: .72; }
/* passo ATUAL (primeiro nao concluido) — secao destacada */
.chk.current {
  border-color: var(--orange); border-width: 2px;
  background: var(--amber-soft);
  box-shadow: 0 4px 12px rgba(212, 114, 42, .16);
}
.chk.current .num { background: var(--orange); color: #fff; }
.chk.current .txt { font-weight: 800; }
.chk.current .here { display: block; }
.chk:active { transform: scale(.985); }
.chk[disabled] { opacity: .55; pointer-events: none; }

/* ---------- MODO ROTEIRO (dia de quotes — paradas em accordion) ----------
   Prefixo stp- proprio. Cartao grande clicavel por parada: hora em chip,
   nome + endereco, anel de progresso do grupo. Expandido: mapa, agenda e o
   checklist da parada (mesmos .chk tocaveis de sempre). */
.stp-loose { margin-bottom: 12px; }
.stp-wrap { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }

.stp-card {
  background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius);
  overflow: hidden; transition: border-color .2s, box-shadow .2s;
}
.stp-card.open { border-color: var(--orange); box-shadow: 0 6px 16px rgba(212, 114, 42, .15); }
.stp-card.stp-done { border-color: var(--green); }

.stp-head {
  display: flex; align-items: center; gap: 11px; width: 100%; min-height: 64px;
  padding: 12px 13px; background: none; border: 0; cursor: pointer;
  font-family: inherit; text-align: left;
  transition: background .15s, transform .08s;
}
.stp-head:active { transform: scale(.985); background: var(--amber-soft); }
.stp-card.stp-done .stp-head:active { background: var(--green-soft); }

/* chip de HORA grande — legibilidade no carro/canteiro */
.stp-time {
  flex: none; background: var(--warm-bg); color: var(--warm-light);
  font-weight: 900; font-size: 15.5px; letter-spacing: .01em;
  padding: 10px 11px; border-radius: 11px; white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.stp-card.stp-done .stp-time { background: var(--green); }

.stp-mid { flex: 1; min-width: 0; }
.stp-nm { display: block; font-size: 15.5px; font-weight: 800; color: var(--ink); line-height: 1.25; }
.stp-card.stp-done .stp-nm { color: #246b3c; }
.stp-ad {
  display: block; font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
}

/* anel de progresso da parada (feitos/total do grupo) */
.stp-ring { position: relative; flex: none; width: 40px; height: 40px; }
.stp-ring svg { width: 40px; height: 40px; transform: rotate(-90deg); display: block; }
.stp-ring circle { fill: none; stroke-width: 3.5; }
.stp-ring .rbg { stroke: var(--light-2); }
.stp-ring .rfg { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset .35s ease; }
.stp-ring .rtx {
  position: absolute; inset: 0; display: grid; place-items: center;
  font-size: 10.5px; font-weight: 900; color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
}
.stp-card.stp-done .rtx { color: var(--green); }

.stp-chev { flex: none; color: var(--ink-faint); font-size: 16px; transition: transform .25s ease; }
.stp-card.open .stp-chev { transform: rotate(180deg); }

/* corpo do accordion — transicao suave (grid-rows 0fr -> 1fr + opacity) */
.stp-body {
  display: grid; grid-template-rows: 0fr; opacity: 0;
  transition: grid-template-rows .3s ease, opacity .3s ease;
}
.stp-card.open .stp-body { grid-template-rows: 1fr; opacity: 1; }
.stp-inner { overflow: hidden; min-height: 0; }
.stp-pad { padding: 2px 12px 13px; }

/* botoes grandes da parada: mapa (primario) + agenda (secundario) */
.stp-map, .stp-cal {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  min-height: 52px; border-radius: 13px; text-decoration: none;
  font-weight: 900; font-size: 15px; letter-spacing: .02em;
  margin-bottom: 9px; transition: transform .08s, opacity .15s;
}
.stp-map:active, .stp-cal:active { transform: scale(.97); opacity: .9; }
.stp-map { background: var(--orange); color: #fff; }
.stp-cal { background: var(--card); border: 1.5px solid var(--orange); color: var(--warm-bg); }

.stp-chk { margin-top: 3px; }

/* ---------- MATERIAIS ---------- */
.mat-list { display: flex; flex-direction: column; gap: 11px; }
.mat-row { display: flex; gap: 11px; align-items: flex-start; font-size: 15px; font-weight: 600; }
.mat-row .iac-icon { color: var(--orange); flex: none; width: 19px; height: 19px; margin-top: 1px; }

/* ---------- UPLOADS ---------- */
.upload-sec { margin-bottom: 18px; }
.upload-sec .lbl { font-weight: 800; font-size: 14.5px; color: var(--warm-bg); margin-bottom: 9px; }
.upload-drop {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px;
  min-height: 96px; padding: 18px; cursor: pointer;
  border: 2px dashed var(--line-2); border-radius: 14px; background: var(--card);
  color: var(--ink-soft); font-weight: 700; font-size: 14px; text-align: center;
  transition: border-color .15s, background .15s;
}
.upload-drop:active { background: var(--amber-soft); border-color: var(--orange); }
.upload-drop .iac-icon { width: 30px; height: 30px; color: var(--orange); }
.upload-drop input[type=file] { display: none; }

.thumbs { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; margin-top: 11px; }
.thumb { aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--light-2); position: relative; border: 1px solid var(--line); }
.thumb img, .thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb .nm { position: absolute; left: 0; right: 0; bottom: 0; background: rgba(61, 43, 31, .74); color: #fff; font-size: 9.5px; font-weight: 600; padding: 3px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thumb .badge-up { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 50%; background: var(--green); display: grid; place-items: center; }
.thumb .badge-up .iac-icon { width: 12px; height: 12px; color: #fff; }
.thumb.pending { opacity: .6; }
.thumb .spin { position: absolute; inset: 0; display: grid; place-items: center; }
.thumb .spin::after { content: ""; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,.5); border-top-color: var(--orange); border-radius: 50%; animation: gspin .7s linear infinite; }
@keyframes gspin { to { transform: rotate(360deg); } }

/* ---------- BOTOES ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  border: 1.5px solid transparent; border-radius: 14px; cursor: pointer;
  font-family: inherit; font-weight: 800; font-size: 16px; padding: 15px 18px;
  transition: transform .08s, background .15s, opacity .15s;
}
.btn .iac-icon { width: 19px; height: 19px; }
.btn.green { background: var(--green); color: #fff; }
.btn.dark { background: var(--warm-bg); color: var(--warm-light); }
.btn.block { width: 100%; }
.btn:active { transform: scale(.98); }
.btn[disabled] { opacity: .85; cursor: default; }

/* ---------- RODAPE FIXO DE CONTATO (ligar / WhatsApp pro Italo) ---------- */
.contact-bar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  display: flex; gap: 10px;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  background: var(--warm-bg);
  box-shadow: 0 -4px 16px rgba(61, 43, 31, .28);
}
.contact-bar .cb-btn {
  flex: 1; min-height: 52px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  border-radius: 14px; text-decoration: none;
  font-weight: 900; font-size: 15px; letter-spacing: .02em; color: #fff;
  transition: transform .08s, opacity .15s;
}
.contact-bar .cb-btn:active { transform: scale(.97); opacity: .9; }
.contact-bar .cb-btn.call { background: var(--orange); }
.contact-bar .cb-btn.wa { background: #25D366; }

/* ---------- EMPTY / LINK INVALIDO ---------- */
.empty { text-align: center; color: var(--ink-faint); padding: 56px 24px; font-weight: 600; }
.empty .iac-icon { width: 48px; height: 48px; color: var(--line-2); }
.empty .ttl { font-size: 19px; color: var(--warm-bg); margin-top: 16px; font-weight: 800; }
.empty .sub { margin-top: 6px; font-size: 14px; }

/* ---------- DEMO BANNER ---------- */
.demo-banner {
  background: var(--warm-bg-2); color: var(--orange-soft);
  font-size: 12px; font-weight: 800; text-align: center; letter-spacing: .04em;
  padding: 7px 12px; text-transform: uppercase;
}

/* ---------- TOAST ---------- */
.toast {
  /* acima do rodape fixo de contato */
  position: fixed; left: 50%; bottom: calc(96px + env(safe-area-inset-bottom));
  transform: translateX(-50%) translateY(14px);
  background: var(--warm-bg); color: #fff; font-weight: 700; font-size: 14px;
  padding: 12px 18px; border-radius: 999px; display: flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 22px rgba(61, 43, 31, .3); opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; z-index: 50; max-width: 90vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { background: #9a3b2a; }
.toast .iac-icon { width: 18px; height: 18px; color: var(--green-soft); flex: none; }
.toast.err .iac-icon { color: #f0c9bf; }

/* ---------- LOADING ---------- */
.loading { text-align: center; padding: 60px 20px; color: var(--ink-soft); font-weight: 700; }
.loading::before { content: ""; display: block; width: 30px; height: 30px; margin: 0 auto 16px; border: 3px solid var(--line); border-top-color: var(--orange); border-radius: 50%; animation: gspin .7s linear infinite; }

</style>
</head>
<body>

  <script>
/* === inline: guyapi.js === */
// ============================================================================
// IAC — CAMADA DE DADOS DO PORTAL DO GUY (guyapi.js)
// ----------------------------------------------------------------------------
// SEGURANCA: este arquivo NUNCA carrega o banco inteiro. Ele fala SO com o
// servidor (Supabase) atraves de 4 funcoes RPC sub-safe:
//   wo_get(p_token)                      -> a WO daquele token
//     v2: inclui valor_repasse (o que o SUB recebe), pago_ao_sub e payments[]
//     — SOMENTE o dinheiro DO SUB. NUNCA preco do cliente, margem ou outros jobs.
//   wo_set_check(p_token, item_id, done) -> marca item do checklist
//   wo_add_upload(p_token, tipo, path, filename) -> registra um upload
//   wo_set_status(p_token, status)       -> muda status (ex 'Concluido')
//
// O RLS no Supabase garante que a anon key NAO le precos, margens, jobs, caixa
// nem outras WOs. Aqui no front nao tem regra de negocio nem dado sensivel.
//
// MODO DEMO: se window.IAC_CFG.anonKey estiver vazio, NAO cria client Supabase
// e NAO toca em banco nenhum — devolve um unico work order de exemplo (inline,
// sub-safe, sem preco) so pra visualizar a UI. Isso garante que mesmo sem chave
// configurada o portal jamais vaza o banco real (que nem esta presente aqui).
// ============================================================================
(function () {
  var CFG = window.IAC_CFG || {};
  var DEMO = !CFG.anonKey; // sem anon key => modo demo, sem banco real

  // mapeia o tipo da UI (plural) -> tipo do storage/RPC (singular)
  // o bucket aceita SOMENTE: 'recibo' | 'antes' | 'depois'
  var TIPO = { recibos: 'recibo', antes: 'antes', depois: 'depois' };

  // --------------------------------------------------------------------------
  // Client Supabase (so fora do modo demo)
  // --------------------------------------------------------------------------
  var sb = null;
  if (!DEMO) {
    if (!window.supabase || !window.supabase.createClient) {
      throw new Error('supabase-js v2 nao carregou — verifique o <script> do CDN.');
    }
    sb = window.supabase.createClient(CFG.url, CFG.anonKey, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
  }

  // --------------------------------------------------------------------------
  // MODO DEMO — um unico work order de exemplo, sub-safe, ZERO preco.
  // --------------------------------------------------------------------------
  var DEMO_WO = {
    id: 'demo-wo',
    cliente: 'Sample Client (DEMO)',
    endereco: '123 Ocean Ave',
    cidade_st: 'Long Branch, NJ 07740',
    data: '2026-07-02',
    hora: '8:00 AM',
    servico: 'Vinyl Plank Install — Living Room + Hallway',
    idioma: 'en',
    obs: 'Material is already on site. Client home all day. (This is a DEMO work order — no real data, no pricing.)',
    status: 'Agendado',
    // v2 — dinheiro DO SUB (repasse). NUNCA preco do cliente nem margem.
    valor_repasse: 1250,
    pago_ao_sub: 500,
    payments: [
      { data: '2026-07-01', valor: 500 }
    ],
    checklist: [
      { id: 'demo-c1', item: 'Acclimate material 24h before install', done: true },
      { id: 'demo-c2', item: 'Check subfloor is clean, dry and level', done: false },
      { id: 'demo-c3', item: 'Install underlayment', done: false },
      { id: 'demo-c4', item: 'Lay planks + cut around doorways', done: false },
      { id: 'demo-c5', item: 'Install transitions + clean up site', done: false }
    ],
    materiais: [
      { id: 'demo-m1', descricao: 'Vinyl plank boxes (already on site)' },
      { id: 'demo-m2', descricao: 'Underlayment roll' },
      { id: 'demo-m3', descricao: 'Transition strips (2)' }
    ],
    uploads: [] // {id, tipo, filename, storage_path, created_at}
  };

  function demoClone() {
    return JSON.parse(JSON.stringify(DEMO_WO));
  }
  // estado vivo do demo (pra check/upload/status persistirem na sessao)
  var demoState = null;
  function demoGet() {
    if (!demoState) demoState = demoClone();
    return demoState;
  }

  // --------------------------------------------------------------------------
  // API PUBLICA
  // --------------------------------------------------------------------------

  // gGetWO(token) -> { data, error }  (data = WO sub-safe ou null)
  async function gGetWO(token) {
    if (DEMO) {
      return { data: demoGet(), error: null };
    }
    var res = await sb.rpc('wo_get', { p_token: token });
    return { data: res.data || null, error: res.error || null };
  }

  // gSetCheck(token, itemId, done) -> { data, error }
  async function gSetCheck(token, itemId, done) {
    if (DEMO) {
      var w = demoGet();
      (w.checklist || []).forEach(function (c) {
        if (c.id === itemId) c.done = !!done;
      });
      return { data: true, error: null };
    }
    var res = await sb.rpc('wo_set_check', {
      p_token: token, p_item_id: itemId, p_done: !!done
    });
    return { data: res.data, error: res.error || null };
  }

  // gComplete(token) -> { data, error }  (marca a WO como 'Concluido')
  async function gComplete(token) {
    if (DEMO) {
      demoGet().status = 'Concluido';
      return { data: true, error: null };
    }
    var res = await sb.rpc('wo_set_status', { p_token: token, p_status: 'Concluido' });
    return { data: res.data, error: res.error || null };
  }

  // gUpload(token, tipo, file) -> { data, error }
  //   1) sobe o arquivo pro bucket 'wo-uploads' em <token>/<tipo>/<arquivo>
  //   2) registra o upload via RPC wo_add_upload
  //   `tipo` aceita 'recibos'|'antes'|'depois' (UI) ou ja singular.
  async function gUpload(token, tipo, file) {
    var t = TIPO[tipo] || tipo; // normaliza pro singular do storage
    var safeName = sanitizeName(file && file.name ? file.name : 'arquivo');
    var path = token + '/' + t + '/' + Date.now() + '-' + safeName;

    if (DEMO) {
      var w = demoGet();
      w.uploads = w.uploads || [];
      w.uploads.push({
        id: 'demo-u' + (w.uploads.length + 1),
        tipo: t, filename: file ? file.name : safeName,
        storage_path: path, created_at: new Date().toISOString()
      });
      return { data: { path: path }, error: null };
    }

    // 1) upload binario pro storage
    var up = await sb.storage.from('wo-uploads').upload(path, file, {
      cacheControl: '3600', upsert: false,
      contentType: (file && file.type) || undefined
    });
    if (up.error) return { data: null, error: up.error };

    // 2) registra o metadado via RPC sub-safe
    var reg = await sb.rpc('wo_add_upload', {
      p_token: token, p_tipo: t,
      p_path: path, p_filename: (file && file.name) || safeName
    });
    if (reg.error) return { data: null, error: reg.error };

    return { data: { path: path }, error: null };
  }

  function sanitizeName(name) {
    return String(name)
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-zA-Z0-9._-]+/g, '_')
      .replace(/_+/g, '_').slice(0, 80) || 'arquivo';
  }

  window.IAC_GUY = {
    DEMO: DEMO,
    gGetWO: gGetWO,
    gSetCheck: gSetCheck,
    gComplete: gComplete,
    gUpload: gUpload
  };
})();

</script>

  }
  function dateLong(s, lang) {

    var es = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    var arr = lang === 'en' ? en : (lang === 'es' ? es : pt);
    return arr[d.getDay()] + ', ' + String(d.getMonth() + 1).padStart(2, '0') + '/' +

  // dia da semana + data curta (usado na data de RETORNO da pendencia)

  function dateReturn(s, lang) {

    var d = new Date(s + 'T00:00:00');
    if (isNaN(d)) return s;
    var pt = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    var en = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    var es = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    var arr = lang === 'en' ? en : (lang === 'es' ? es : pt);

  // Monta o link do Google Calendar pre-preenchido (action=TEMPLATE).
  // Com hora: inicio na hora da WO, fim +2h (horario "flutuante", sem TZ).
  // Sem hora: evento de dia inteiro (YYYYMMDD/dia seguinte).
  // SUB-SAFE: detalhes = servico + contato do Italo + link deste portal.
  // NUNCA incluir valor de repasse, preco de cliente ou margem no evento.
  // opt (modo roteiro): { hora, title } — evento de UMA parada especifica.
  function gcalUrl(addr, opt) {
    opt = opt || {};
    if (!W || !W.data) return null;
    var d = new Date(W.data + 'T00:00:00');
    if (isNaN(d)) return null;
    function p2(n) { return String(n).padStart(2, '0'); }
    function ymd(dt) { return dt.getFullYear() + p2(dt.getMonth() + 1) + p2(dt.getDate()); }

    var hora = ('hora' in opt) ? opt.hora : W.hora;
    var dates;
    var hm = hora ? String(hora).match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i) : null;
    if (hm) {
      var hh = parseInt(hm[1], 10);
      var mi = hm[2] ? parseInt(hm[2], 10) : 0;
      var ap = (hm[3] || '').toLowerCase();
      if (ap === 'pm' && hh < 12) hh += 12;
      if (ap === 'am' && hh === 12) hh = 0;
      if (hh > 23 || mi > 59) hm = null;
      else {
        var ini = new Date(d.getFullYear(), d.getMonth(), d.getDate(), hh, mi, 0);
        var fim = new Date(ini.getTime() + 2 * 60 * 60 * 1000); // +2h
        dates = ymd(ini) + 'T' + p2(ini.getHours()) + p2(ini.getMinutes()) + '00/' +
          ymd(fim) + 'T' + p2(fim.getHours()) + p2(fim.getMinutes()) + '00';
      }
    }
    if (!hm) {
      // dia inteiro: fim exclusivo = dia seguinte
      var next = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
      dates = ymd(d) + '/' + ymd(next);
    }

    var svc = String(W.servico || 'Job').slice(0, 60);
    var details = svc + '\n' + T.calDetails + '\n' + T.calLink + ': ' +
      location.origin + location.pathname + '?t=' + encodeURIComponent(TOKEN);

    return 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
      '&text=' + encodeURIComponent(opt.title ? String(opt.title).slice(0, 70) : 'IAC: ' + svc) +
      '&dates=' + dates +
      (addr ? '&location=' + encodeURIComponent(addr) : '') +
      '&details=' + encodeURIComponent(details);
  }

  // ==========================================================================
  // MODO ROTEIRO — dia de quotes (ex: dia do Edu) vira PARADAS clicaveis.
  // ==========================================================================

  // circunferencia do anel de progresso (r=15.5 no viewBox 36x36)
  var RING_C = 2 * Math.PI * 15.5;

  // botao de item do checklist. ⚠️ data-i e SEMPRE o INDICE GLOBAL do item no
  // W.checklist original — e ISSO que o wo_set_check persiste. No modo roteiro
  // a posicao VISUAL muda (agrupada por parada), o indice NAO.
  function chkBtn(it, label, pin) {
    var c = it.c, i = it.i;
    return '<button class="chk' + (c.done ? ' done' : '') + '" data-i="' + i + '">' +
      '<span class="num">' + (pin ? '📍' : (i + 1)) + '</span>' +
      '<span class="txt">' + (label ? esc(label) : linkify(c.item)) +
      '<span class="here">' + esc(T.currentStep) + '</span></span>' +
      '<span class="box">' + ic('check', 18) + '</span></button>';
  }

  // [RT-PARSE-START] — funcao PURA (testavel em node): agrupa o checklist
  // plano em paradas. Devolve null se NAO for roteiro (nenhum '📍 ENDERECO').
  //   { inicio:[{c,i}], stops:[{num,nome,hora,endereco,mapUrl,raw,header,items}], fim:[{c,i}] }
  //   header/inicio/fim/items = { c: item original, i: INDICE GLOBAL }.
  //   Itens antes do 1o 📍 = inicio do dia; cada 📍 abre um grupo; itens
  //   FINAIS consecutivos comecando com ✅ = fim do dia. Parse tolerante do
  //   header ('📍 ENDERECO N# — NOME (HORA): endereco — abrir no mapa: URL');
  //   se nao casar, cai no texto cru (raw) sem quebrar nada.
  function parseRoteiro(checklist, ctx) {
    if (!checklist || !checklist.length) return null;
    var HDR = /^📍\s*ENDERE[CÇ]O\s*(\d+)#/i;
    var isRt = false;
    for (var x = 0; x < checklist.length; x++) {
      if (HDR.test(String(checklist[x].item || ''))) { isRt = true; break; }
    }
    if (!isRt) return synthOne(checklist, ctx);

    var items = checklist.map(function (c, i) { return { c: c, i: i }; });
    // fim do dia: itens finais consecutivos que comecam com ✅
    var fim = [];
    while (items.length && /^✅/.test(String(items[items.length - 1].c.item || ''))) {
      fim.unshift(items.pop());
    }
    var inicio = [], stops = [], cur = null;
    items.forEach(function (it) {
      var txt = String(it.c.item || '');
      var m = txt.match(HDR);
      if (m) {
        cur = { num: m[1], nome: '', hora: '', endereco: '', mapUrl: '', raw: txt, header: it, items: [] };
        var p = txt.match(/^📍\s*ENDERE[CÇ]O\s*\d+#\s*[—–-]+\s*(.+?)\s*\(([^)]+)\)\s*:\s*([\s\S]*)$/i);
        if (p) {
          cur.nome = p[1];
          cur.hora = p[2];
          var rest = p[3];
          var u = rest.match(/(https?:\/\/\S+)/);
          if (u) cur.mapUrl = u[1];
          cur.endereco = rest
            .replace(/[—–-]*\s*abrir\s+no\s+mapa:?\s*/i, ' ')
            .replace(/https?:\/\/\S+/g, '')
            .replace(/\s*[—–-]+\s*$/, '')
            .trim();
        }
        stops.push(cur);
      } else if (cur) {
        cur.items.push(it);
      } else {
        inicio.push(it);
      }
    });
    return { inicio: inicio, stops: stops, fim: fim };
  }
  // [RT-PARSE-END]

  // WO "flat" (1 job, 1 endereco) tambem vira UM cartao-parada sintetico — assim
  // TODO sub ganha o mesmo estilo do roteiro: botao grande de mapa + agenda + o
  // checklist dentro do card. Sem endereco (ex: lembrete so de material) devolve
  // null e o portal cai no checklist simples de sempre. A persistencia NAO muda:
  // cada item mantem o INDICE GLOBAL (data-i) que o wo_set_check usa.
  function synthOne(checklist, ctx) {
    if (!ctx) return null;
    var addr = [ctx.endereco, ctx.cidade_st].filter(Boolean).join(', ');
    if (!addr) return null;
    var items = checklist.map(function (c, i) { return { c: c, i: i }; });
    var stop = {
      num: '', nome: ctx.cliente || addr, hora: ctx.hora || '',
      endereco: addr, mapUrl: 'https://maps.google.com/?q=' + encodeURIComponent(addr),
      raw: ctx.cliente || addr, header: null, items: items, synthetic: true
    };
    return { inicio: [], stops: [stop], fim: [] };
  }

  function stopGroup(s) { return s.synthetic ? s.items : [s.header].concat(s.items); }

  function roteiroHtml(rt) {
    // primeira parada NAO totalmente concluida comeca EXPANDIDA
    var openIdx = -1;
    for (var k = 0; k < rt.stops.length; k++) {
      var pend = stopGroup(rt.stops[k]).some(function (it) { return !it.c.done; });
      if (pend) { openIdx = k; break; }
    }
    var h = '';
    if (rt.inicio.length) {
      h += '<div class="checklist stp-loose">' +
        rt.inicio.map(function (it) { return chkBtn(it); }).join('') + '</div>';
    }
    h += '<div class="stp-wrap">' +
      rt.stops.map(function (s, k) { return stopCard(s, k, k === openIdx); }).join('') + '</div>';
    if (rt.fim.length) {
      h += '<div class="checklist stp-loose">' +
        rt.fim.map(function (it) { return chkBtn(it); }).join('') + '</div>';
    }
    return h;
  }

  // cartao de UMA parada (accordion). Fechado: hora + nome + endereco + anel.
  // Expandido: botao de mapa, botao de agenda e o checklist DAQUELA parada
  // (mesmos itens tocaveis, data-i = indice global). O proprio item 📍 vira o
  // checkbox 'parada concluida' no fim do grupo.
  function stopCard(s, k, open) {
    var grp = stopGroup(s);
    var done = grp.filter(function (it) { return it.c.done; }).length;
    var total = grp.length;
    var nome = s.nome || s.raw.replace(/^📍\s*/, '');
    var full = done >= total;

    var h = '<div class="stp-card' + (full ? ' stp-done' : '') + (open ? ' open' : '') + '" data-stp="' + k + '">';
    h += '<button type="button" class="stp-head">' +
      '<span class="stp-time">' + esc(s.hora || '—') + '</span>' +
      '<span class="stp-mid"><span class="stp-nm">' + esc((s.num ? s.num + '# — ' : '') + nome) + '</span>' +
      (s.endereco ? '<span class="stp-ad">' + esc(s.endereco) + '</span>' : '') +
      '</span>' +
      '<span class="stp-ring"><svg viewBox="0 0 36 36" aria-hidden="true">' +
      '<circle class="rbg" cx="18" cy="18" r="15.5"></circle>' +
      '<circle class="rfg" cx="18" cy="18" r="15.5" stroke-dasharray="' + RING_C.toFixed(1) +
      '" stroke-dashoffset="' + (RING_C * (1 - done / total)).toFixed(1) + '"></circle></svg>' +
      '<span class="rtx">' + done + '/' + total + '</span></span>' +
      '<span class="stp-chev">▾</span></button>';

    h += '<div class="stp-body"><div class="stp-inner"><div class="stp-pad">';
    var map = s.mapUrl || (s.endereco ? 'https://maps.google.com/?q=' + encodeURIComponent(s.endereco) : '');
    if (map) {
      h += '<a class="stp-map" href="' + esc(map) + '" target="_blank" rel="noopener">🗺️ ' +
        esc(T.map).toUpperCase() + '</a>';
    }
    var cal = W.data ? gcalUrl(s.endereco, { hora: s.hora, title: 'IAC: ' + nome }) : null;
    if (cal) {
      h += '<a class="stp-cal" href="' + esc(cal) + '" target="_blank" rel="noopener">📅 ' +
        esc(T.addCal) + '</a>';
    }
    h += '<div class="checklist stp-chk">' +
      s.items.map(function (it) { return chkBtn(it); }).join('') +
      (s.synthetic ? '' : chkBtn(s.header, '📍 ' + T.rtStop + ' ' + s.num + '# ' + T.rtDone, true)) +
      '</div>';
    h += '</div></div></div></div>';
    return h;
  }

  // atualiza anel + estado 'concluida' de cada parada (chamado a cada toque)
  function updateStops() {
    if (!RT) return;
    RT.stops.forEach(function (s, k) {
      var card = view.querySelector('.stp-card[data-stp="' + k + '"]');
      if (!card) return;
      var grp = stopGroup(s);
      var done = grp.filter(function (it) { return it.c.done; }).length;
      var total = grp.length;
      var fg = card.querySelector('.rfg');
      if (fg) fg.style.strokeDashoffset = (RING_C * (1 - done / total)).toFixed(1);
      var tx = card.querySelector('.rtx');
      if (tx) tx.textContent = done + '/' + total;
      card.classList.toggle('stp-done', done >= total);
    });
  }

  // Card de pagamento DO SUB: valor_repasse / pago_ao_sub / payments[].
  // Exibe SOMENTE o dinheiro do proprio sub. Zero preco de cliente/margem.
  function payCard() {
    var h = '<div class="pay-card">';
    if (W.valor_repasse == null) {
      h += '<div class="pay-main"><span class="pay-emoji">💰</span>' +
        '<span class="pay-agreed">' + esc(T.payAgreed) + '</span></div>';
      h += '</div>';
      return h;
    }
    var total = Number(W.valor_repasse) || 0;
    var paid = Number(W.pago_ao_sub) || 0;
    var left = Math.max(0, total - paid);
    h += '<div class="pay-main"><span class="pay-emoji">💰</span>' +
      '<span class="pay-lbl">' + esc(T.yourPay) + ':</span>' +
      '<span class="pay-val">' + esc(fmtMoney(total)) + '</span></div>';
    if (paid > 0) {
      if (left <= 0) {
        h += '<div class="pay-sub paid">' + ic('done', 16) + '<span>' + esc(T.paidFull) +
          ' · ' + esc(fmtMoney(paid)) + '</span></div>';
      } else {
        h += '<div class="pay-sub"><span class="ok">' + esc(T.received) + ': ' + esc(fmtMoney(paid)) +
          '</span><span class="dot">·</span><span class="due">' + esc(T.remaining) + ': ' +
          esc(fmtMoney(left)) + '</span></div>';
      }
      if (W.payments && W.payments.length) {
        h += '<div class="pay-hist"><div class="ph-t">' + esc(T.payHistory) + '</div>' +
          W.payments.map(function (p) {
            var v = (p && (p.valor != null ? p.valor : p.amount));
            var d = (p && (p.data || p.date)) || '';
            return '<div class="ph-row"><span>' + esc(dateShort(d)) + '</span>' +
              '<b>' + esc(fmtMoney(v)) + '</b></div>';
          }).join('') + '</div>';
      }
    }
    h += '</div>';
    return h;
  }

  function uploadSection(key, label, icon, accept) {
    return '<div class="upload-sec" data-key="' + key + '">' +
      '<div class="lbl">' + esc(label) + '</div>' +
      '<label class="upload-drop">' + ic(icon, 28) + '<span>' + esc(T.add) + '</span>' +
      '<input type="file" accept="' + accept + '" multiple data-up="' + key + '" /></label>' +
      '<div class="thumbs" data-thumbs="' + key + '"></div></div>';
  }

  // tipo do servidor (singular) -> key da UI
  function uiKeyForTipo(t) {
    if (t === 'recibo') return 'recibos';
    if (t === 'antes') return 'antes';
    if (t === 'depois') return 'depois';
    return 'recibos';
  }

  function bind() {
    // CHECKLIST — persiste cada toque via gSetCheck. Busca no VIEW inteiro:
    // funciona no modo normal (#chk) E no modo roteiro (.chk dentro das
    // paradas). ⚠️ data-i = INDICE GLOBAL no W.checklist — persistencia
    // identica nos dois modos (wo_set_check via item.id).
    view.querySelectorAll('.chk').forEach(function (b) {
      b.onclick = async function () {
        var i = +b.getAttribute('data-i');
        var item = W.checklist[i];
        var next = !item.done;
        // otimista
        item.done = next;
        b.classList.toggle('done', next);
        updateProgress();
        b.setAttribute('disabled', '');
        var r = await GUY.gSetCheck(TOKEN, item.id, next);
        b.removeAttribute('disabled');
        if (r.error || r.data === false) {
          // reverte
          item.done = !next;
          b.classList.toggle('done', item.done);
          updateProgress();
          toast(T.saveErr, true);
        }
      };
    });

    // MODO ROTEIRO — abre/fecha o cartao da parada (accordion)
    view.querySelectorAll('.stp-head').forEach(function (hd) {
      hd.onclick = function () {
        hd.parentNode.classList.toggle('open');
      };
    });

    // UPLOADS — sobem de verdade via gUpload
    view.querySelectorAll('input[data-up]').forEach(function (inp) {
      inp.onchange = function () {
        var key = inp.getAttribute('data-up');
        Array.prototype.forEach.call(inp.files, function (f) { uploadOne(key, f); });
        inp.value = '';
      };
    });

    // COMPLETE — persiste status via gComplete
    var cbtn = document.getElementById('complete');
    if (cbtn) {
      cbtn.onclick = async function () {
        cbtn.setAttribute('disabled', '');
        var r = await GUY.gComplete(TOKEN);
        if (r.error || r.data === false) {
          cbtn.removeAttribute('disabled');
          return toast(T.saveErr, true);
        }
        W.status = 'Concluido';
        cbtn.classList.remove('green'); cbtn.classList.add('dark');
        cbtn.innerHTML = ic('check', 18) + esc(T.completed);
        toast(T.completed);
      };
    }
  }

  // sobe um arquivo com preview + spinner + estado
  async function uploadOne(key, file) {
    var box = view.querySelector('[data-thumbs="' + key + '"]');
    if (!box) return;
    var div = document.createElement('div');
    div.className = 'thumb pending';
    var url = URL.createObjectURL(file);
    var isVid = /video\//.test(file.type);
    div.innerHTML =
      (isVid
        ? '<video src="' + url + '" muted playsinline></video>'
        : '<img src="' + url + '" alt="" />') +
      '<div class="spin"></div>' +
      '<span class="nm">' + esc(file.name) + '</span>';
    box.appendChild(div);

    var r = await GUY.gUpload(TOKEN, key, file);
    var spin = div.querySelector('.spin');
    if (spin) spin.remove();
    if (r.error) {
      div.classList.add('pending');
      toast(T.upErr, true);
      // permite retry: clicar na thumb refaz o upload
      div.onclick = function () { div.remove(); uploadOne(key, file); };
      return;
    }
    div.classList.remove('pending');
    var badge = document.createElement('span');
    badge.className = 'badge-up';
    badge.innerHTML = ic('check', 12);
    div.appendChild(badge);
  }

  // thumb de upload ja existente no servidor (sem preview binario)
  function addServerThumb(key, u) {
    var box = view.querySelector('[data-thumbs="' + key + '"]');
    if (!box) return;
    var div = document.createElement('div');
    div.className = 'thumb';
    var isVid = /\.(mp4|mov|webm|m4v)$/i.test(u.filename || '');
    div.innerHTML =
      '<div style="width:100%;height:100%;display:grid;place-items:center;color:var(--orange)">' +
      ic(isVid ? 'camera' : 'receipt', 26) + '</div>' +
      '<span class="badge-up">' + ic('check', 12) + '</span>' +
      '<span class="nm">' + esc(u.filename || '') + '</span>';
    box.appendChild(div);
  }

  function updateProgress() {
    if (!W.checklist || !W.checklist.length) return;
    var done = W.checklist.filter(function (c) { return c.done; }).length;
    var total = W.checklist.length;
    var bar = document.getElementById('bar');
    var prog = document.getElementById('prog');
    if (bar) bar.style.width = Math.round((done / total) * 100) + '%';
    if (prog) prog.textContent = done + ' ' + T.done + ' ' + total;
    updateStops();
    updateCurrent();
  }

  // destaca o passo ATUAL: primeiro item do checklist ainda nao concluido
  // (view inteiro — funciona no modo normal e no modo roteiro)
  function updateCurrent() {
    var btns = view.querySelectorAll('.chk');
    if (!btns.length) return;
    var curIdx = -1;
    for (var i = 0; i < W.checklist.length; i++) {
      if (!W.checklist[i].done) { curIdx = i; break; }
    }
    btns.forEach(function (b) {
      b.classList.toggle('current', +b.getAttribute('data-i') === curIdx);
    });
  }

  function renderNotFound(l) {
    var t = I18N[l] || I18N.pt;
    document.getElementById('brandSub').textContent = t.yourJob;
    view.innerHTML = '<div class="empty">' +
      ic('blocker', 48) +
      '<div class="ttl">' + esc(t.notFound) + '</div>' +
      '<div class="sub">' + esc(t.notFoundSub) + '</div></div>';
  }

  init();
})();

</script>
</body>
</html>
